<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="cardGradientHero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradientHero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.1" />
    </linearGradient>
    <filter id="dropShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Lanyard Strap -->
  <g id="lanyard">
    <!-- Main strap -->
    <rect x="185" y="0" width="30" height="80" fill="#1a1a1a" rx="4"/>
    
    <!-- Strap texture -->
    <line x1="190" y1="0" x2="190" y2="80" stroke="#2a2a2a" stroke-width="1" opacity="0.5"/>
    <line x1="210" y1="0" x2="210" y2="80" stroke="#2a2a2a" stroke-width="1" opacity="0.5"/>
    
    <!-- Top connector -->
    <circle cx="200" cy="8" r="4" fill="#333"/>
    <circle cx="200" cy="8" r="2.5" fill="#444"/>
    
    <!-- Connection point -->
    <line x1="200" y1="70" x2="200" y2="95" stroke="#333" stroke-width="2"/>
  </g>

  <!-- Card Container with shadow -->
  <g filter="url(#dropShadow)">
    <!-- Card Main -->
    <g id="card" class="draggable-card">
      <rect x="80" y="90" width="240" height="320" fill="url(#cardGradientHero)" rx="12"/>
      
      <!-- Accent Gradient Overlay -->
      <rect x="80" y="90" width="240" height="320" fill="url(#accentGradientHero)" rx="12"/>
      
      <!-- Top Accent Bar -->
      <rect x="80" y="90" width="240" height="3" fill="#60a5fa" rx="12"/>
      
      <!-- Border -->
      <rect x="80" y="90" width="240" height="320" fill="none" stroke="#475569" stroke-width="0.8" rx="12" opacity="0.5"/>
      
      <!-- Card Hole -->
      <circle cx="200" cy="105" r="5" fill="#60a5fa" opacity="0.6"/>
      <line x1="200" y1="110" x2="200" y2="122" stroke="#60a5fa" stroke-width="1.5" opacity="0.4"/>
      
      <!-- Profile Section -->
      <g>
        <!-- Avatar Circle Background -->
        <circle cx="200" cy="160" r="35" fill="#0f172a" opacity="0.5"/>
        <circle cx="200" cy="160" r="34" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.3"/>
        
        <!-- Avatar Placeholder (initials) -->
        <text x="200" y="165" font-size="26" font-weight="bold" text-anchor="middle" fill="#60a5fa">BS</text>
      </g>
      
      <!-- Name -->
      <text x="200" y="215" font-size="14" font-weight="600" text-anchor="middle" fill="#f1f5f9" font-family="system-ui, -apple-system">
        Bambang Solehudin
      </text>
      
      <!-- Role -->
      <text x="200" y="238" font-size="10" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system">
        Frontend Developer
      </text>
      <text x="200" y="252" font-size="9" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system">
        3+ Years Experience
      </text>
      
      <!-- Divider -->
      <line x1="95" y1="270" x2="305" y2="270" stroke="#475569" stroke-width="0.8" opacity="0.3"/>
      
      <!-- Skills Section -->
      <text x="95" y="290" font-size="8" fill="#94a3b8" font-family="system-ui, -apple-system" font-weight="500">
        Skills
      </text>
      
      <!-- Skill Badges - Smaller -->
      <g>
        <!-- React -->
        <rect x="95" y="298" width="50" height="20" fill="#1e293b" stroke="#60a5fa" stroke-width="0.8" rx="4" opacity="0.5"/>
        <text x="120" y="312" font-size="9" text-anchor="middle" fill="#60a5fa" font-family="system-ui, -apple-system">
          React
        </text>
        
        <!-- Next.js -->
        <rect x="150" y="298" width="50" height="20" fill="#1e293b" stroke="#60a5fa" stroke-width="0.8" rx="4" opacity="0.5"/>
        <text x="175" y="312" font-size="9" text-anchor="middle" fill="#60a5fa" font-family="system-ui, -apple-system">
          Next.js
        </text>
        
        <!-- Tailwind -->
        <rect x="205" y="298" width="50" height="20" fill="#1e293b" stroke="#60a5fa" stroke-width="0.8" rx="4" opacity="0.5"/>
        <text x="230" y="312" font-size="9" text-anchor="middle" fill="#60a5fa" font-family="system-ui, -apple-system">
          Tailwind
        </text>
        
        <!-- JavaScript -->
        <rect x="260" y="298" width="40" height="20" fill="#1e293b" stroke="#60a5fa" stroke-width="0.8" rx="4" opacity="0.5"/>
        <text x="280" y="312" font-size="9" text-anchor="middle" fill="#60a5fa" font-family="system-ui, -apple-system">
          JS
        </text>
      </g>
      
      <!-- Bottom Info -->
      <text x="200" y="350" font-size="8" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system">
        Frontend Developer Portfolio
      </text>
    </g>
  </g>

  <!-- Glow Effect (appears on hover via CSS) -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>