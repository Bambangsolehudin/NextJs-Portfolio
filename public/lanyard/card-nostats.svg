<svg viewBox="0 0 360 480" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.1" />
    </linearGradient>
  </defs>

  <!-- Main Card Background -->
  <rect width="360" height="480" fill="url(#cardGradient)" rx="16"/>
  
  <!-- Accent Gradient Overlay -->
  <rect width="360" height="480" fill="url(#accentGradient)" rx="16"/>
  
  <!-- Top Accent Bar -->
  <rect x="0" y="0" width="360" height="4" fill="#60a5fa" rx="16"/>
  
  <!-- Border -->
  <rect x="0" y="0" width="360" height="480" fill="none" stroke="#475569" stroke-width="1" rx="16" opacity="0.5"/>
  
  <!-- Lanyard Hole -->
  <circle cx="180" cy="20" r="6" fill="#60a5fa" opacity="0.6"/>
  <line x1="180" y1="26" x2="180" y2="45" stroke="#60a5fa" stroke-width="2" opacity="0.4"/>
  
  <!-- Profile Section -->
  <g>
    <!-- Avatar Circle Background -->
    <circle cx="180" cy="90" r="45" fill="#0f172a" opacity="0.5"/>
    <circle cx="180" cy="90" r="44" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.3"/>
    
    <!-- Avatar Placeholder (initials) -->
    <text x="180" y="95" font-size="32" font-weight="bold" text-anchor="middle" fill="#60a5fa">BS</text>
  </g>
  
  <!-- Name -->
  <text x="180" y="160" font-size="18" font-weight="600" text-anchor="middle" fill="#f1f5f9" font-family="system-ui, -apple-system">
    Bambang Solehudin
  </text>
  
  <!-- Role -->
  <text x="180" y="190" font-size="13" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system">
    Frontend Developer
  </text>
  <text x="180" y="207" font-size="12" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system">
    3+ Years Experience
  </text>
  
  <!-- Divider -->
  <line x1="40" y1="230" x2="320" y2="230" stroke="#475569" stroke-width="1" opacity="0.3"/>
  
  <!-- Skills Section -->
  <text x="40" y="265" font-size="11" fill="#94a3b8" font-family="system-ui, -apple-system" font-weight="500">
    Skills
  </text>
  
  <!-- Skill Badges -->
  <g>
    <!-- React -->
    <rect x="40" y="275" width="70" height="28" fill="#1e293b" stroke="#60a5fa" stroke-width="1" rx="6" opacity="0.5"/>
    <text x="75" y="295" font-size="12" text-anchor="middle" fill="#60a5fa" font-family="system-ui, -apple-system">
      React
    </text>
    
    <!-- Next.js -->
    <rect x="120" y="275" width="75" height="28" fill="#1e293b" stroke="#60a5fa" stroke-width="1" rx="6" opacity="0.5"/>
    <text x="157.5" y="295" font-size="12" text-anchor="middle" fill="#60a5fa" font-family="system-ui, -apple-system">
      Next.js
    </text>
    
    <!-- Tailwind -->
    <rect x="205" y="275" width="75" height="28" fill="#1e293b" stroke="#60a5fa" stroke-width="1" rx="6" opacity="0.5"/>
    <text x="242.5" y="295" font-size="12" text-anchor="middle" fill="#60a5fa" font-family="system-ui, -apple-system">
      Tailwind
    </text>
    
    <!-- JavaScript -->
    <rect x="290" y="275" width="30" height="28" fill="#1e293b" stroke="#60a5fa" stroke-width="1" rx="6" opacity="0.5"/>
    <text x="305" y="295" font-size="12" text-anchor="middle" fill="#60a5fa" font-family="system-ui, -apple-system">
      JS
    </text>
  </g>
  
  <!-- Bottom Info -->
  <text x="180" y="375" font-size="11" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system">
    Frontend Developer Portfolio
  </text>
  <text x="180" y="395" font-size="10" text-anchor="middle" fill="#475569" font-family="system-ui, -apple-system">
    specializing in modern web technologies
  </text>
</svg>